<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c3fc5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4a8f5;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="6" height="200" fill="#6c3fc5" rx="3"/>

  <!-- EEG wave decoration -->
  <polyline points="650,100 665,100 672,65 680,135 688,80 696,120 703,95 711,105 718,70 726,130 734,100 900,100"
    fill="none" stroke="url(#waveGrad)" stroke-width="2.5" opacity="0.5"/>

  <!-- Brain node dots -->
  <circle cx="760" cy="60" r="4" fill="#6c3fc5" opacity="0.15"/>
  <circle cx="800" cy="45" r="3" fill="#6c3fc5" opacity="0.12"/>
  <circle cx="840" cy="65" r="5" fill="#6c3fc5" opacity="0.1"/>
  <circle cx="820" cy="85" r="3" fill="#6c3fc5" opacity="0.12"/>
  <circle cx="775" cy="80" r="4" fill="#6c3fc5" opacity="0.1"/>
  <line x1="760" y1="60" x2="800" y2="45" stroke="#6c3fc5" stroke-width="1" opacity="0.1"/>
  <line x1="800" y1="45" x2="840" y2="65" stroke="#6c3fc5" stroke-width="1" opacity="0.1"/>
  <line x1="840" y1="65" x2="820" y2="85" stroke="#6c3fc5" stroke-width="1" opacity="0.1"/>
  <line x1="820" y1="85" x2="775" y2="80" stroke="#6c3fc5" stroke-width="1" opacity="0.1"/>
  <line x1="775" y1="80" x2="760" y2="60" stroke="#6c3fc5" stroke-width="1" opacity="0.1"/>

  <!-- Main title -->
  <text x="50" y="80" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#1a1a2e" letter-spacing="1">cortex-unsupervised</text>

  <!-- Subtitle -->
  <text x="52" y="112" font-family="Arial, sans-serif" font-size="15" fill="#555" letter-spacing="0.5">Unsupervised Discovery of Latent Neural States from EEG Data</text>

  <!-- Second subtitle -->
  <text x="52" y="133" font-family="Arial, sans-serif" font-size="15" fill="#555" letter-spacing="0.5">ICA · PCA · UMAP · K-Means · GMM · PhysioNet Motor Imagery</text>

  <!-- Divider -->
  <line x1="50" y1="150" x2="620" y2="150" stroke="#6c3fc5" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="52" y="172" font-family="Georgia, serif" font-size="13" fill="#888" font-style="italic">Exploring the geometry of brain state space — label-free.</text>
</svg>
